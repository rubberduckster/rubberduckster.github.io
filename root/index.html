<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>
    <!-- NAV -->
    <div class="top-nav">
        <div class="logo">Rubberducky Portfolio</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <!-- PROFILE SECTION -->
    <div class="profile">

        <!-- Top code text -->
        <p class="code-tag top">&lt;div <span class="attr">class</span>=<span class="value">"overlay"</span> <br>
        <span class="attr">style</span>=<span class="value">"border-radius: 5px;"</span>&gt;</p>

        <div class="center-block">

            <!-- DOT LINES + TEXT -->
            <div class="decor-wrapper">

                <div class="line left-line"></div>
                <div class="line right-line"></div>

                <p class="right-line-text">Ruby Todorovic Matheson</p>
                <p class="left-line-text">
                    I'm a student at TEC<br>
                    on the data technician line,<br>
                    specializing in programming.
                </p>

                <!-- IMAGE -->
                <div class="profileImageContainer">
                    <img src="/assets/images/ProfilePic.jpg" alt="Profile Picture">
                </div>

                <!-- BUTTONS -->
                <div class="buttons">
                    <a href="mailto:mcrubygirl@hotmail.com" class="btn">
                        <img src="/assets/images/Email-icon.svg" alt="Email">
                    </a>

                    <a href="https://github.com/rubberduckster" target="_blank" class="btn">
                        <img src="/assets/images/Github-icon.svg" alt="GitHub">
                    </a>

                    <a href="/assets/Ruby-Todorovic-Resume.pdf" download class="btn">
                        <img src="/assets/images/Download-icon.svg" alt="Download">
                    </a>
                </div>
            </div>
        </div>

        <!-- Bottom code tag -->
        <p class="code-tag bottom">&lt;/div&gt;</p>

    </div>

    <script src="/scripts/script.js" defer></script>
</body>
</html>
